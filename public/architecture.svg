<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 680" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowI" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6366f1"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="680" fill="#ffffff"/>
  <text x="40" y="44" font-size="22" font-weight="700" fill="#0f172a">AI Study Copilot — Architecture</text>
  <text x="40" y="68" font-size="13" fill="#64748b">Grounded RAG with cite-or-refuse, an honest bug-hunt loop, and a measured evaluation harness.</text>

  <!-- Browser layer -->
  <rect x="40" y="92" width="620" height="78" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="60" y="118" font-size="14" font-weight="700" fill="#3730a3">Browser · Next.js App Router</text>
  <g font-size="12" fill="#3730a3">
    <rect x="60" y="130" width="92" height="26" rx="13" fill="#ffffff" stroke="#c7d2fe"/><text x="106" y="147" text-anchor="middle">Ask</text>
    <rect x="160" y="130" width="110" height="26" rx="13" fill="#ffffff" stroke="#c7d2fe"/><text x="215" y="147" text-anchor="middle">Bug Hunt</text>
    <rect x="278" y="130" width="120" height="26" rx="13" fill="#ffffff" stroke="#c7d2fe"/><text x="338" y="147" text-anchor="middle">Dashboard</text>
    <rect x="406" y="130" width="92" height="26" rx="13" fill="#ffffff" stroke="#c7d2fe"/><text x="452" y="147" text-anchor="middle">Eval</text>
  </g>

  <!-- API layer -->
  <rect x="40" y="206" width="620" height="96" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="60" y="231" font-size="14" font-weight="700" fill="#0f172a">API routes</text>
  <text x="60" y="250" font-size="11" fill="#64748b">guarded: rate limit (5/min) · daily cap · max-token ceiling</text>
  <g font-size="11.5" fill="#0f172a">
    <rect x="60" y="260" width="138" height="28" rx="8" fill="#ffffff" stroke="#e2e8f0"/><text x="129" y="278" text-anchor="middle">POST /api/ask</text>
    <rect x="206" y="260" width="150" height="28" rx="8" fill="#ffffff" stroke="#e2e8f0"/><text x="281" y="278" text-anchor="middle">POST /api/bug-hunt</text>
    <rect x="364" y="260" width="170" height="28" rx="8" fill="#ffffff" stroke="#e2e8f0"/><text x="449" y="278" text-anchor="middle">POST /api/sources/upload</text>
    <rect x="542" y="260" width="100" height="28" rx="8" fill="#ffffff" stroke="#e2e8f0"/><text x="592" y="278" text-anchor="middle">read-only GET</text>
  </g>

  <!-- Core domain libs -->
  <rect x="40" y="338" width="620" height="96" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="60" y="363" font-size="14" font-weight="700" fill="#0f172a">Core domain (src/lib)</text>
  <g font-size="11.5" fill="#0f172a">
    <rect x="60" y="376" width="92" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0"/><text x="106" y="396" text-anchor="middle">ingest</text><text x="106" y="411" text-anchor="middle" font-size="9.5" fill="#64748b">chunk+embed</text>
    <rect x="160" y="376" width="104" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0"/><text x="212" y="396" text-anchor="middle">retrieval</text><text x="212" y="411" text-anchor="middle" font-size="9.5" fill="#64748b">pgvector knn</text>
    <rect x="272" y="376" width="120" height="44" rx="8" fill="#ffffff" stroke="#c7d2fe"/><text x="332" y="396" text-anchor="middle" font-weight="700" fill="#3730a3">ask</text><text x="332" y="411" text-anchor="middle" font-size="9.5" fill="#3730a3">cite-or-refuse</text>
    <rect x="400" y="376" width="110" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0"/><text x="455" y="396" text-anchor="middle">bug-hunt</text><text x="455" y="411" text-anchor="middle" font-size="9.5" fill="#64748b">infer→cite→quiz</text>
    <rect x="518" y="376" width="124" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0"/><text x="580" y="396" text-anchor="middle">quiz · weak-topics</text><text x="580" y="411" text-anchor="middle" font-size="9.5" fill="#64748b">grade · EWMA</text>
  </g>

  <!-- Infra row -->
  <rect x="40" y="470" width="300" height="120" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="60" y="495" font-size="14" font-weight="700" fill="#0f172a">LLM provider</text>
  <text x="60" y="513" font-size="11" fill="#64748b">swappable · model ids from env</text>
  <rect x="60" y="524" width="260" height="48" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="190" y="544" text-anchor="middle" font-size="12" fill="#0f172a">OpenAI</text>
  <text x="190" y="560" text-anchor="middle" font-size="10" fill="#64748b">embeddings (1536-d) · chat (reasoning + fast)</text>

  <rect x="360" y="470" width="300" height="120" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="380" y="495" font-size="14" font-weight="700" fill="#0f172a">Postgres + pgvector</text>
  <text x="380" y="513" font-size="11" fill="#64748b">Supabase</text>
  <text x="380" y="536" font-size="10.5" fill="#0f172a">sources · chunks(vector) · ask_queries</text>
  <text x="380" y="552" font-size="10.5" fill="#0f172a">bug_hunts · quiz_* · weak_topics</text>
  <text x="380" y="568" font-size="10.5" fill="#0f172a">eval_runs · usage_events</text>

  <!-- Eval harness lane (offline) -->
  <rect x="700" y="92" width="240" height="498" rx="12" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="720" y="118" font-size="14" font-weight="700" fill="#065f46">Eval harness</text>
  <text x="720" y="136" font-size="11" fill="#047857">offline · CLI-only (npm run eval)</text>

  <rect x="720" y="150" width="200" height="40" rx="8" fill="#ffffff" stroke="#a7f3d0"/><text x="820" y="170" text-anchor="middle" font-size="12" fill="#065f46">20-case dataset</text><text x="820" y="183" text-anchor="middle" font-size="9.5" fill="#047857">in-corpus + negatives</text>
  <rect x="720" y="202" width="200" height="40" rx="8" fill="#ffffff" stroke="#a7f3d0"/><text x="820" y="222" text-anchor="middle" font-size="12" fill="#065f46">runner</text><text x="820" y="235" text-anchor="middle" font-size="9.5" fill="#047857">real ask pipeline</text>
  <rect x="720" y="254" width="200" height="56" rx="8" fill="#ffffff" stroke="#a7f3d0"/><text x="820" y="276" text-anchor="middle" font-size="12" fill="#065f46">metrics + LLM judge</text><text x="820" y="291" text-anchor="middle" font-size="9.5" fill="#047857">citation precision · refusal</text><text x="820" y="303" text-anchor="middle" font-size="9.5" fill="#047857">accuracy · answer support</text>
  <rect x="720" y="322" width="200" height="40" rx="8" fill="#ffffff" stroke="#a7f3d0"/><text x="820" y="342" text-anchor="middle" font-size="12" fill="#065f46">→ eval_runs</text><text x="820" y="355" text-anchor="middle" font-size="9.5" fill="#047857">stored, shown on /eval</text>

  <text x="720" y="392" font-size="11" font-weight="700" fill="#065f46">Latest run</text>
  <text x="720" y="412" font-size="11" fill="#047857">citation precision&#160;&#160;100%</text>
  <text x="720" y="430" font-size="11" fill="#047857">refusal accuracy&#160;&#160;&#160;&#160;100%</text>
  <text x="720" y="448" font-size="11" fill="#047857">answer support&#160;&#160;&#160;&#160;&#160;&#160;~92%</text>

  <!-- Flow arrows -->
  <line x1="350" y1="170" x2="350" y2="206" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="302" x2="350" y2="338" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="434" x2="190" y2="470" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="434" x2="500" y2="470" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- eval feeds db + dashboard -->
  <line x1="700" y1="342" x2="662" y2="430" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="150" x2="500" y2="158" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowI)"/>
  <text x="540" y="150" font-size="9.5" fill="#6366f1">results → Eval page</text>
</svg>
